<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SE Corp — Admin Diagnostics</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--or:#c9a84c;--or2:#e8c96a;--noir:#0a0906;--fond:#f7f4ee;--gris:#6b6560;--blanc:#fff;--vert:#2d6a4f;--rouge:#c0392b;--bleu:#1a3a5c;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"DM Sans",sans-serif;background:var(--fond);color:var(--noir);min-height:100vh;}
.hdr{background:var(--noir);padding:1.1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--or);}
.hdr-left{display:flex;align-items:center;gap:.8rem;}
.logo{width:40px;height:40px;border-radius:50%;background:var(--or);display:flex;align-items:center;justify-content:center;font-family:"Cormorant Garamond",serif;font-weight:700;font-size:.95rem;color:var(--noir);}
.hdr h1{font-family:"Cormorant Garamond",serif;font-size:1.2rem;color:var(--blanc);}
.hdr p{font-size:.7rem;color:#aaa;}
.badge-admin{background:var(--or);color:var(--noir);font-size:.7rem;font-weight:700;padding:.2rem .6rem;border-radius:20px;}

/* LOGIN */
.login-wrap{max-width:400px;margin:4rem auto;padding:1rem;}
.login-box{background:var(--blanc);border-radius:14px;padding:2rem;box-shadow:0 4px 24px rgba(0,0,0,.08);border-top:4px solid var(--or);text-align:center;}
.login-box h2{font-family:"Cormorant Garamond",serif;font-size:1.5rem;font-weight:700;margin-bottom:.3rem;}
.login-box p{font-size:.83rem;color:var(--gris);margin-bottom:1.2rem;}
.login-box input{width:100%;padding:.7rem 1rem;border:1.5px solid #ddd;border-radius:9px;font-size:.9rem;background:var(--fond);margin-bottom:.8rem;}
.login-box input:focus{outline:none;border-color:var(--or);}
.btn-gold{background:var(--or);color:var(--noir);border:none;border-radius:9px;padding:.75rem 1.5rem;font-weight:600;font-size:.9rem;cursor:pointer;width:100%;}
.btn-gold:hover{background:var(--or2);}
.err-login{color:var(--rouge);font-size:.8rem;margin-top:.5rem;display:none;}

/* DASHBOARD */
.dash{display:none;padding:1.5rem;}

/* STATS BAR */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.8rem;margin-bottom:1.5rem;}
.stat-card{background:var(--blanc);border-radius:12px;padding:1rem;box-shadow:0 2px 12px rgba(0,0,0,.06);border-top:3px solid var(--or);text-align:center;}
.stat-num{font-family:"Cormorant Garamond",serif;font-size:2rem;font-weight:700;color:var(--or);line-height:1;}
.stat-lbl{font-size:.72rem;color:var(--gris);margin-top:.2rem;}

/* FILTERS */
.filters{background:var(--blanc);border-radius:12px;padding:1rem 1.2rem;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:1.2rem;display:flex;gap:.8rem;flex-wrap:wrap;align-items:center;}
.filters label{font-size:.72rem;font-weight:600;color:var(--gris);text-transform:uppercase;letter-spacing:.04em;}
.filters select,.filters input[type=text]{padding:.45rem .8rem;border:1.5px solid #ddd;border-radius:8px;font-size:.82rem;background:var(--fond);}
.filters select:focus,.filters input:focus{outline:none;border-color:var(--or);}
.filter-group{display:flex;flex-direction:column;gap:.2rem;}
.btn-sm{padding:.4rem .9rem;border:none;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;}
.btn-refresh{background:var(--noir);color:var(--blanc);}
.btn-export{background:var(--vert);color:var(--blanc);}

/* TABLE */
.table-wrap{background:var(--blanc);border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.06);overflow:hidden;}
.table-hdr{padding:.9rem 1.2rem;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;}
.table-hdr h3{font-family:"Cormorant Garamond",serif;font-size:1.1rem;font-weight:700;}
.count-lbl{font-size:.78rem;color:var(--gris);}
table{width:100%;border-collapse:collapse;font-size:.82rem;}
th{background:var(--fond);padding:.65rem .8rem;text-align:left;font-size:.7rem;font-weight:600;color:var(--gris);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #eee;white-space:nowrap;}
td{padding:.6rem .8rem;border-bottom:1px solid #f5f2ec;vertical-align:top;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fffdf8;}
.pill{display:inline-block;padding:.18rem .55rem;border-radius:20px;font-size:.7rem;font-weight:600;}
.pill-ok{background:#e8f5ee;color:var(--vert);}
.pill-nok{background:#fdecea;color:var(--rouge);}
.pill-pi-oui{background:#e8f5ee;color:var(--vert);}
.pill-pi-non{background:#fdecea;color:var(--rouge);}
.pill-neutral{background:#f0ede6;color:var(--gris);}

/* DETAIL PANEL */
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;z-index:100;align-items:center;justify-content:center;}
.detail-overlay.open{display:flex;}
.detail-box{background:var(--blanc);border-radius:14px;padding:1.8rem;max-width:580px;width:90%;max-height:85vh;overflow-y:auto;position:relative;}
.detail-close{position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--gris);}
.detail-title{font-family:"Cormorant Garamond",serif;font-size:1.3rem;font-weight:700;margin-bottom:.8rem;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1rem;}
.dg-item{background:var(--fond);border-radius:8px;padding:.6rem .8rem;}
.dg-label{font-size:.68rem;color:var(--gris);text-transform:uppercase;font-weight:600;}
.dg-val{font-size:.85rem;font-weight:600;margin-top:.1rem;}
.notion-recap{margin-top:.8rem;}
.nr-row{display:flex;justify-content:space-between;align-items:center;padding:.45rem .6rem;border-radius:7px;margin-bottom:.3rem;font-size:.8rem;}
.nr-ok{background:#f0faf4;border-left:3px solid var(--vert);}
.nr-nok{background:#fdf0f0;border-left:3px solid var(--rouge);}
.nr-none{background:#f7f4ee;border-left:3px solid #ddd;color:#999;}
.loading{text-align:center;padding:3rem;color:var(--gris);}
.spin{display:inline-block;width:24px;height:24px;border:3px solid #eee;border-top-color:var(--or);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:900px){.stats-row{grid-template-columns:1fr 1fr;}.filters{flex-direction:column;align-items:flex-start;}}
@media(max-width:600px){.stats-row{grid-template-columns:1fr 1fr;} table{font-size:.75rem;} td,th{padding:.5rem .5rem;}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="logo">SE</div>
    <div><h1>S.E. Corporation &mdash; Admin Diagnostics</h1><p>Tableau de bord priv&eacute;</p></div>
  </div>
  <span class="badge-admin">ADMIN</span>
</div>

<!-- LOGIN -->
<div id="login-wrap" class="login-wrap">
  <div class="login-box">
    <div style="font-size:2rem;margin-bottom:.5rem;">&#128274;</div>
    <h2>Acc&egrave;s priv&eacute;</h2>
    <p>R&eacute;serv&eacute; &agrave; Ing. Mo&iuml;se Zame</p>
    <input type="password" id="pwd" placeholder="Mot de passe admin" onkeydown="if(event.key==='Enter')login()">
    <button class="btn-gold" onclick="login()">Se connecter</button>
    <div class="err-login" id="err-login">Mot de passe incorrect.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dash" id="dashboard">

  <div class="stats-row" id="stats-row">
    <div class="stat-card"><div class="stat-num" id="st-total">—</div><div class="stat-lbl">Diagnostics total</div></div>
    <div class="stat-card"><div class="stat-num" id="st-pi" style="color:var(--vert)">—</div><div class="stat-lbl">Pr&eacute;inscrits</div></div>
    <div class="stat-card"><div class="stat-num" id="st-npi" style="color:var(--rouge)">—</div><div class="stat-lbl">Non inscrits</div></div>
    <div class="stat-card"><div class="stat-num" id="st-week">—</div><div class="stat-lbl">Cette semaine</div></div>
  </div>

  <div class="filters">
    <div class="filter-group">
      <label>Recherche</label>
      <input type="text" id="f-search" placeholder="Nom, pr&eacute;nom..." oninput="applyFilters()">
    </div>
    <div class="filter-group">
      <label>Classe</label>
      <select id="f-classe" onchange="applyFilters()">
        <option value="">Toutes</option>
        <option>Tle C</option><option>Tle D</option><option>Tle A</option>
        <option>Tle A4</option><option>Tle E</option><option>Tle F</option>
      </select>
    </div>
    <div class="filter-group">
      <label>M&eacute;tier</label>
      <select id="f-metier" onchange="applyFilters()">
        <option value="">Tous</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Pr&eacute;inscription</label>
      <select id="f-pi" onchange="applyFilters()">
        <option value="">Tous</option>
        <option value="oui">Pr&eacute;inscrits</option>
        <option value="non">Non inscrits</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Point faible</label>
      <select id="f-notion" onchange="applyFilters()">
        <option value="">Toutes notions</option>
        <option value="ln_def">Fonctions ln/exp</option>
        <option value="eq">Equations</option>
        <option value="ineq">In&eacute;quations</option>
        <option value="poly3">Polyn&ocirc;me degr&eacute; 3</option>
        <option value="limites">Limites</option>
        <option value="derivees">D&eacute;riv&eacute;es</option>
        <option value="variation">Tableau de variation</option>
        <option value="etude">Etude compl&egrave;te</option>
      </select>
    </div>
    <div style="display:flex;gap:.4rem;align-items:flex-end;">
      <button class="btn-sm btn-refresh" onclick="loadData()">&#8635; Rafra&icirc;chir</button>
      <button class="btn-sm btn-export" onclick="exportCSV()">&#128229; Export CSV</button>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-hdr">
      <h3>&#128203; Liste des diagnostics</h3>
      <span class="count-lbl" id="count-lbl">Chargement...</span>
    </div>
    <div id="table-area">
      <div class="loading"><div class="spin"></div></div>
    </div>
  </div>

</div>

<!-- DETAIL OVERLAY -->
<div class="detail-overlay" id="detail-overlay" onclick="closeDetail(event)">
  <div class="detail-box" id="detail-box">
    <button class="detail-close" onclick="document.getElementById('detail-overlay').classList.remove('open')">&#10005;</button>
    <div id="detail-content"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, orderBy, query }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

var firebaseConfig = {
  apiKey: "AIzaSyAhSTl2OR5ztfoIwB2TgIqEaiMjD6TmrcI",
  authDomain: "se-corporation-quiz-7187e.firebaseapp.com",
  projectId: "se-corporation-quiz-7187e",
  storageBucket: "se-corporation-quiz-7187e.appspot.com",
  messagingSenderId: "538290513786",
  appId: "1:538290513786:web:placeholder"
};

var app = initializeApp(firebaseConfig);
var db = getFirestore(app);

var PWD = "SE2025admin";
var allData = [];

var NOTIONS_LABELS = {
  ln_def:"Fonctions ln/exp", eq:"Equations", ineq:"In\u00e9quations",
  poly3:"Polyn\u00f4me degr\u00e9 3", limites:"Limites", derivees:"D\u00e9riv\u00e9es",
  variation:"Tableau variation", etude:"Etude compl\u00e8te"
};

window.login = function() {
  var p = document.getElementById("pwd").value;
  if(p === PWD) {
    document.getElementById("login-wrap").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadData();
  } else {
    document.getElementById("err-login").style.display = "block";
  }
};

window.loadData = async function() {
  document.getElementById("table-area").innerHTML = '<div class="loading"><div class="spin"></div></div>';
  try {
    var q = query(collection(db, "diagnostics"), orderBy("date","desc"));
    var snap = await getDocs(q);
    allData = [];
    snap.forEach(function(doc){ allData.push({id:doc.id, ...doc.data()}); });
    updateStats();
    populateMetierFilter();
    applyFilters();
  } catch(e) {
    document.getElementById("table-area").innerHTML = '<div class="loading">Erreur de chargement. V\u00e9rifie la connexion.</div>';
    console.error(e);
  }
};

function updateStats() {
  var total = allData.length;
  var pi = allData.filter(function(d){return d.preinscrit==="oui";}).length;
  var npi = allData.filter(function(d){return d.preinscrit==="non";}).length;
  var semaine = getSemaine();
  var week = allData.filter(function(d){return d.semaine===semaine;}).length;
  document.getElementById("st-total").textContent = total;
  document.getElementById("st-pi").textContent = pi;
  document.getElementById("st-npi").textContent = npi;
  document.getElementById("st-week").textContent = week;
}

function populateMetierFilter() {
  var metiers = [...new Set(allData.map(function(d){return d.metier||"RAS";}).filter(Boolean))].sort();
  var sel = document.getElementById("f-metier");
  var cur = sel.value;
  sel.innerHTML = '<option value="">Tous</option>';
  metiers.forEach(function(m){
    sel.innerHTML += '<option value="'+m+'"'+(cur===m?" selected":"")+'>'+m+'</option>';
  });
}

window.applyFilters = function() {
  var search = document.getElementById("f-search").value.toLowerCase();
  var classe = document.getElementById("f-classe").value;
  var metier = document.getElementById("f-metier").value;
  var pi = document.getElementById("f-pi").value;
  var notion = document.getElementById("f-notion").value;

  var filtered = allData.filter(function(d) {
    if(search && !(d.prenom+d.nom+d.etab).toLowerCase().includes(search)) return false;
    if(classe && d.classe !== classe) return false;
    if(metier && d.metier !== metier) return false;
    if(pi && d.preinscrit !== pi) return false;
    if(notion && d.notions && d.notions[notion] && d.notions[notion].level !== "nok") return false;
    return true;
  });

  renderTable(filtered);
  document.getElementById("count-lbl").textContent = filtered.length + " / " + allData.length + " \u00e9l\u00e8ves";
};

function renderTable(data) {
  if(data.length===0){
    document.getElementById("table-area").innerHTML = '<div class="loading">Aucun r\u00e9sultat.</div>';
    return;
  }

  var html = '<div style="overflow-x:auto"><table><thead><tr>' +
    '<th>#</th><th>Nom complet</th><th>Classe</th><th>M\u00e9tier</th>' +
    '<th>Pr\u00e9inscrit</th><th>Points faibles</th><th>T\u00e9l.</th><th>Date</th><th></th>' +
    '</tr></thead><tbody>';

  data.forEach(function(d, i) {
    var nok = [];
    if(d.notions) {
      Object.keys(d.notions).forEach(function(k){
        if(d.notions[k].level==="nok") nok.push(NOTIONS_LABELS[k]||k);
      });
    }
    var piClass = d.preinscrit==="oui"?"pill-pi-oui":"pill-pi-non";
    var piLbl = d.preinscrit==="oui"?"&#9989; Oui":"&#10060; Non";
    var dateStr = d.date && d.date.toDate ? d.date.toDate().toLocaleDateString("fr-FR") : d.semaine||"—";
    var nokHtml = nok.length>0
      ? nok.map(function(n){return '<span class="pill pill-nok">'+n+'</span>';}).join(" ")
      : '<span class="pill pill-neutral">Aucun signal\u00e9</span>';

    html += '<tr>' +
      '<td style="color:var(--gris);font-size:.75rem;">'+(i+1)+'</td>' +
      '<td><strong>'+d.prenom+' '+d.nom+'</strong>' +
        (d.sexe?'<br><span style="font-size:.7rem;color:var(--gris)">'+d.sexe+'</span>':'')+'</td>' +
      '<td>'+d.classe+'</td>' +
      '<td>'+d.metier+'</td>' +
      '<td><span class="pill '+piClass+'">'+piLbl+'</span>' +
        (d.raison_non?'<br><span style="font-size:.68rem;color:var(--gris)">'+getRaisonLabel(d.raison_non)+'</span>':'')+'</td>' +
      '<td>'+nokHtml+'</td>' +
      '<td style="font-size:.78rem;">'+d.tel+(d.tel_parent?'<br><span style="color:var(--bleu)">Parent: '+d.tel_parent+'</span>':'')+'</td>' +
      '<td style="font-size:.75rem;color:var(--gris);">'+dateStr+'</td>' +
      '<td><button onclick="showDetail(\''+d.id+'\')" style="background:var(--or);border:none;border-radius:6px;padding:.3rem .7rem;font-size:.75rem;font-weight:600;cursor:pointer;">D\u00e9tail</button></td>' +
    '</tr>';
  });

  html += '</tbody></table></div>';
  document.getElementById("table-area").innerHTML = html;
}

function getRaisonLabel(r) {
  var map = {
    parent_decide:"Parent d\u00e9cide", pas_info:"Manque d'infos",
    attendre_bac:"Attend le bac", pas_convaincu:"Pas convaincu", autre:"Autre"
  };
  return map[r]||r;
}

window.showDetail = function(id) {
  var d = allData.find(function(x){return x.id===id;});
  if(!d) return;

  var ok = [], nok = [], none = [];
  if(d.notions){
    Object.keys(d.notions).forEach(function(k){
      var s = d.notions[k];
      var lbl = NOTIONS_LABELS[k]||k;
      var type = s.type==="def"?" (D\u00e9f.)":s.type==="app"?" (Applic.)":s.type==="both"?" (Les deux)":"";
      if(s.level==="ok") ok.push(lbl);
      else if(s.level==="nok") nok.push(lbl+type);
      else none.push(lbl);
    });
  }

  var html = '<div class="detail-title">'+d.prenom+' '+d.nom+'</div>';
  html += '<div class="detail-grid">';
  html += '<div class="dg-item"><div class="dg-label">Classe</div><div class="dg-val">'+d.classe+'</div></div>';
  html += '<div class="dg-item"><div class="dg-label">Sexe</div><div class="dg-val">'+(d.sexe||"—")+'</div></div>';
  html += '<div class="dg-item"><div class="dg-label">Etablissement</div><div class="dg-val">'+(d.etab||"—")+'</div></div>';
  html += '<div class="dg-item"><div class="dg-label">M\u00e9tier vis\u00e9</div><div class="dg-val">'+d.metier+'</div></div>';
  html += '<div class="dg-item"><div class="dg-label">WhatsApp</div><div class="dg-val">'+d.tel+'</div></div>';
  html += '<div class="dg-item"><div class="dg-label">Pr\u00e9inscrit</div><div class="dg-val">'+(d.preinscrit==="oui"?"&#9989; Oui":"&#10060; Non")+'</div></div>';
  if(d.tel_parent) html += '<div class="dg-item" style="grid-column:span 2"><div class="dg-label">Tel parent</div><div class="dg-val" style="color:var(--bleu)">'+d.tel_parent+'</div></div>';
  if(d.raison_non) html += '<div class="dg-item" style="grid-column:span 2"><div class="dg-label">Raison non-inscription</div><div class="dg-val">'+getRaisonLabel(d.raison_non)+(d.raison_autre?" — "+d.raison_autre:"")+'</div></div>';
  html += '</div>';

  html += '<div style="font-weight:600;font-size:.85rem;margin-bottom:.5rem;">Notions &mdash; D\u00e9tail</div>';
  html += '<div class="notion-recap">';
  nok.forEach(function(n){html+='<div class="nr-row nr-nok"><span>&#128308; '+n+'</span><span class="pill pill-nok">Difficult\u00e9</span></div>';});
  ok.forEach(function(n){html+='<div class="nr-row nr-ok"><span>&#128994; '+n+'</span><span class="pill pill-ok">Ma\u00eetris\u00e9</span></div>';});
  none.forEach(function(n){html+='<div class="nr-row nr-none"><span>'+n+'</span><span style="font-size:.72rem;color:#bbb">Non \u00e9valu\u00e9</span></div>';});
  html += '</div>';

  var msgWA = buildWAMessage(d, nok, ok);
  html += '<div style="margin-top:1rem;"><div style="font-weight:600;font-size:.85rem;margin-bottom:.4rem;">Message WhatsApp pr\u00eat &#128172;</div>';
  html += '<div style="background:#e9e9e9;border-radius:10px;padding:.8rem;font-size:.8rem;white-space:pre-wrap;line-height:1.6;border-left:3px solid #25D366;">'+msgWA+'</div>';
  html += '<button onclick="copyMsg(\''+encodeURIComponent(msgWA)+'\')" style="margin-top:.5rem;background:#25D366;color:white;border:none;border-radius:7px;padding:.4rem .9rem;font-size:.78rem;font-weight:600;cursor:pointer;">&#128203; Copier</button></div>';

  document.getElementById("detail-content").innerHTML = html;
  document.getElementById("detail-overlay").classList.add("open");
};

window.copyMsg = function(encoded) {
  navigator.clipboard.writeText(decodeURIComponent(encoded)).then(function(){
    alert("Message copi\u00e9 !");
  });
};

window.closeDetail = function(e) {
  if(e.target===document.getElementById("detail-overlay"))
    document.getElementById("detail-overlay").classList.remove("open");
};

function buildWAMessage(d, nok, ok) {
  var salut = d.sexe==="F" ? "Ma ch\u00e8re " : "Mon cher ";
  var msg = salut + d.prenom + " \ud83d\udc4b\n\n";
  msg += "J'ai analys\u00e9 ton diagnostic. Voici mon retour personnalis\u00e9.\n\n";

  if(nok.length>0){
    msg += "\u26a0\ufe0f Points \u00e0 travailler en priorit\u00e9 :\n";
    nok.forEach(function(n){msg += "  \u2022 "+n+"\n";});
    msg += "\nCes notions seront au c\u0153ur de tes exercices cette semaine.\n\n";
  }
  if(ok.length>0){
    msg += "\u2705 Points forts :\n";
    ok.forEach(function(n){msg += "  \u2022 "+n+"\n";});
    msg += "\n";
  }
  if(d.metier && d.metier!=="RAS"){
    msg += "\ud83c\udfaf Objectif "+d.metier+" : garde cet objectif en t\u00eate chaque matin.\n\n";
  }
  if(d.preinscrit==="non"){
    msg += "\ud83d\udca1 Tu n'es pas encore pr\u00e9inscrit"+( d.sexe==="F"?"e":"")+". Si c'est ton parent qui d\u00e9cide, partage-lui ce num\u00e9ro : +237 657 882 322.\n\n";
  }
  msg += "On continue ensemble. Je suis l\u00e0.\nIng. Mo\u00efse Zame \u2014 S.E. Corporation";
  return msg;
}

window.exportCSV = function() {
  var filtered = getFiltered();
  var rows = [["Prenom","Nom","Sexe","Classe","Etablissement","Metier","Tel","Tel Parent","Preinscrit","Raison","ln_def","eq","ineq","poly3","limites","derivees","variation","etude","Semaine"]];
  filtered.forEach(function(d){
    var row = [d.prenom,d.nom,d.sexe||"",d.classe,d.etab||"",d.metier,d.tel,d.tel_parent||"",d.preinscrit,d.raison_non||""];
    ["ln_def","eq","ineq","poly3","limites","derivees","variation","etude"].forEach(function(k){
      var s = d.notions&&d.notions[k];
      row.push(s?((s.level||"")+"|"+(s.type||"")):"");
    });
    row.push(d.semaine||"");
    rows.push(row);
  });
  var csv = rows.map(function(r){return r.map(function(c){return '"'+(c||"").toString().replace(/"/g,'""')+'"';}).join(",");}).join("\n");
  var blob = new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8;"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href=url; a.download="diagnostics_SE_Corp.csv"; a.click();
};

function getFiltered() {
  var search = document.getElementById("f-search").value.toLowerCase();
  var classe = document.getElementById("f-classe").value;
  var metier = document.getElementById("f-metier").value;
  var pi = document.getElementById("f-pi").value;
  var notion = document.getElementById("f-notion").value;
  return allData.filter(function(d){
    if(search&&!(d.prenom+d.nom+d.etab||"").toLowerCase().includes(search)) return false;
    if(classe&&d.classe!==classe) return false;
    if(metier&&d.metier!==metier) return false;
    if(pi&&d.preinscrit!==pi) return false;
    if(notion&&d.notions&&d.notions[notion]&&d.notions[notion].level!=="nok") return false;
    return true;
  });
}

function getSemaine() {
  var d = new Date();
  var j = d.getDay()||7;
  var lundi = new Date(d);
  lundi.setDate(d.getDate()-j+1);
  return lundi.toISOString().slice(0,10);
}
