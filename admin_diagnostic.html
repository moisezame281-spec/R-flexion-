<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SE Corp — Admin Diagnostics</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{--or:#c9a84c;--or2:#e8c96a;--noir:#0a0906;--fond:#f7f4ee;--gris:#6b6560;--blanc:#fff;--vert:#2d6a4f;--rouge:#c0392b;--bleu:#1a3a5c;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"DM Sans",sans-serif;background:var(--fond);color:var(--noir);min-height:100vh;}
.hdr{background:var(--noir);padding:1.1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--or);}
.hdr-left{display:flex;align-items:center;gap:.8rem;}
.logo{width:40px;height:40px;border-radius:50%;background:var(--or);display:flex;align-items:center;justify-content:center;font-family:"Cormorant Garamond",serif;font-weight:700;font-size:.95rem;color:var(--noir);}
.hdr h1{font-family:"Cormorant Garamond",serif;font-size:1.2rem;color:var(--blanc);}
.hdr p{font-size:.7rem;color:#aaa;}
.badge-admin{background:var(--or);color:var(--noir);font-size:.7rem;font-weight:700;padding:.2rem .6rem;border-radius:20px;}
.login-wrap{max-width:400px;margin:4rem auto;padding:1rem;}
.login-box{background:var(--blanc);border-radius:14px;padding:2rem;box-shadow:0 4px 24px rgba(0,0,0,.08);border-top:4px solid var(--or);text-align:center;}
.login-box h2{font-family:"Cormorant Garamond",serif;font-size:1.5rem;font-weight:700;margin-bottom:.3rem;}
.login-box p{font-size:.83rem;color:var(--gris);margin-bottom:1.2rem;}
.login-box input{width:100%;padding:.7rem 1rem;border:1.5px solid #ddd;border-radius:9px;font-size:.9rem;background:var(--fond);margin-bottom:.8rem;}
.login-box input:focus{outline:none;border-color:var(--or);}
.btn-gold{background:var(--or);color:var(--noir);border:none;border-radius:9px;padding:.75rem 1.5rem;font-weight:600;font-size:.9rem;cursor:pointer;width:100%;}
.btn-gold:hover{background:var(--or2);}
.err-login{color:var(--rouge);font-size:.8rem;margin-top:.5rem;display:none;}
.dash{display:none;padding:1.5rem;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.8rem;margin-bottom:1.5rem;}
.stat-card{background:var(--blanc);border-radius:12px;padding:1rem;box-shadow:0 2px 12px rgba(0,0,0,.06);border-top:3px solid var(--or);text-align:center;}
.stat-num{font-family:"Cormorant Garamond",serif;font-size:2rem;font-weight:700;color:var(--or);line-height:1;}
.stat-lbl{font-size:.72rem;color:var(--gris);margin-top:.2rem;}
.filters{background:var(--blanc);border-radius:12px;padding:1rem 1.2rem;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:1.2rem;display:flex;gap:.8rem;flex-wrap:wrap;align-items:center;}
.filters label{font-size:.72rem;font-weight:600;color:var(--gris);text-transform:uppercase;letter-spacing:.04em;}
.filters select,.filters input[type=text]{padding:.45rem .8rem;border:1.5px solid #ddd;border-radius:8px;font-size:.82rem;background:var(--fond);}
.filters select:focus,.filters input:focus{outline:none;border-color:var(--or);}
.filter-group{display:flex;flex-direction:column;gap:.2rem;}
.btn-sm{padding:.4rem .9rem;border:none;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;}
.btn-refresh{background:var(--noir);color:var(--blanc);}
.btn-export{background:var(--vert);color:var(--blanc);}
.table-wrap{background:var(--blanc);border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.06);overflow:hidden;}
.table-hdr{padding:.9rem 1.2rem;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;}
.table-hdr h3{font-family:"Cormorant Garamond",serif;font-size:1.1rem;font-weight:700;}
.count-lbl{font-size:.78rem;color:var(--gris);}
table{width:100%;border-collapse:collapse;font-size:.82rem;}
th{background:var(--fond);padding:.65rem .8rem;text-align:left;font-size:.7rem;font-weight:600;color:var(--gris);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #eee;white-space:nowrap;}
td{padding:.6rem .8rem;border-bottom:1px solid #f5f2ec;vertical-align:top;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fffdf8;}
.pill{display:inline-block;padding:.18rem .55rem;border-radius:20px;font-size:.7rem;font-weight:600;}
.pill-ok{background:#e8f5ee;color:var(--vert);}
.pill-nok{background:#fdecea;color:var(--rouge);}
.pill-pi-oui{background:#e8f5ee;color:var(--vert);}
.pill-pi-non{background:#fdecea;color:var(--rouge);}
.pill-neutral{background:#f0ede6;color:var(--gris);}
.btn-pdf{background:linear-gradient(135deg,#c9a84c,#e8c96a);color:var(--noir);border:none;border-radius:6px;padding:.3rem .7rem;font-size:.73rem;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s;}
.btn-pdf:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(201,168,76,.4);}
.btn-detail{background:var(--or);border:none;border-radius:6px;padding:.3rem .7rem;font-size:.75rem;font-weight:600;cursor:pointer;}
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;z-index:100;align-items:center;justify-content:center;}
.detail-overlay.open{display:flex;}
.detail-box{background:var(--blanc);border-radius:14px;padding:1.8rem;max-width:580px;width:90%;max-height:85vh;overflow-y:auto;position:relative;}
.detail-close{position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--gris);}
.detail-title{font-family:"Cormorant Garamond",serif;font-size:1.3rem;font-weight:700;margin-bottom:.8rem;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1rem;}
.dg-item{background:var(--fond);border-radius:8px;padding:.6rem .8rem;}
.dg-label{font-size:.68rem;color:var(--gris);text-transform:uppercase;font-weight:600;}
.dg-val{font-size:.85rem;font-weight:600;margin-top:.1rem;}
.notion-recap{margin-top:.8rem;}
.nr-row{display:flex;justify-content:space-between;align-items:center;padding:.45rem .6rem;border-radius:7px;margin-bottom:.3rem;font-size:.8rem;}
.nr-ok{background:#f0faf4;border-left:3px solid var(--vert);}
.nr-nok{background:#fdf0f0;border-left:3px solid var(--rouge);}
.nr-none{background:#f7f4ee;border-left:3px solid #ddd;color:#999;}
.loading{text-align:center;padding:3rem;color:var(--gris);}
.spin{display:inline-block;width:24px;height:24px;border:3px solid #eee;border-top-color:var(--or);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--noir);color:var(--blanc);padding:.8rem 1.4rem;border-radius:10px;font-size:.82rem;font-weight:600;border-left:4px solid var(--or);transform:translateY(100px);opacity:0;transition:all .3s;z-index:9999;}
.toast.show{transform:translateY(0);opacity:1;}
@media(max-width:900px){.stats-row{grid-template-columns:1fr 1fr;}.filters{flex-direction:column;align-items:flex-start;}}
@media(max-width:600px){.stats-row{grid-template-columns:1fr 1fr;}table{font-size:.75rem;}td,th{padding:.5rem .5rem;}}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-left">
    <div class="logo">SE</div>
    <div><h1>S.E. Corporation &mdash; Admin Diagnostics</h1><p>Tableau de bord priv&eacute;</p></div>
  </div>

<div id="login-wrap" class="login-wrap">

    <p>R&eacute;serv&eacute; &agrave; Ing. Mo&iuml;se Zame</p>

  <div class="filters">
    <div class="filter-group"><label>Recherche</label><input type="text" id="f-search" placeholder="Nom, pr&eacute;nom..." oninput="applyFilters()"></div>
    <div class="filter-group"><label>Classe</label>
      <select id="f-classe" onchange="applyFilters()"><option value="">Toutes</option><option>Tle C</option><option>Tle D</option><option>Tle A</option><option>Tle A4</option><option>Tle E</option><option>Tle F</option></select>
    </div>
    <div class="filter-group"><label>M&eacute;tier</label><select id="f-metier" onchange="applyFilters()"><option value="">Tous</option></select></div>
    <div class="filter-group"><label>Pr&eacute;inscription</label>
      <select id="f-pi" onchange="applyFilters()"><option value="">Tous</option><option value="oui">Pr&eacute;inscrits</option><option value="non">Non inscrits</option></select>
    </div>
    <div class="filter-group"><label>Point faible</label>
      <select id="f-notion" onchange="applyFilters()">
        <option value="">Toutes notions</option><option value="ln_def">Fonctions ln/exp</option>
        <option value="eq">Equations</option><option value="ineq">In&eacute;quations</option>
        <option value="poly3">Polyn&ocirc;me degr&eacute; 3</option><option value="limites">Limites</option>
        <option value="derivees">D&eacute;riv&eacute;es</option><option value="variation">Tableau de variation</option>
        <option value="etude">Etude compl&egrave;te</option>
      </select>
    </div>
    <div style="display:flex;gap:.4rem;align-items:flex-end;">
      <button class="btn-sm btn-refresh" onclick="loadData()">&#8635; Rafra&icirc;chir</button>
      <button class="btn-sm btn-export" onclick="exportCSV()">&#128229; Export CSV</button>
    </div>
  </div>
  <div class="table-wrap">
    <div class="table-hdr"><h3>&#128203; Liste des diagnostics</h3><span class="count-lbl" id="count-lbl">Chargement...</span></div>
    <div id="table-area"><div class="loading"><div class="spin"></div></div></div>
  </div>
</div>

<div class="detail-overlay" id="detail-overlay" onclick="closeDetail(event)">
  <div class="detail-box">
    <button class="detail-close" onclick="document.getElementById('detail-overlay').classList.remove('open')">&#10005;</button>
    <div id="detail-content"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">

import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAhSTl2OR5ztfoIwB2TgIqEaiMjD6TmrcI",
  authDomain: "se-corporation-quiz-7187e.firebaseapp.com",
  projectId: "se-corporation-quiz-7187e",
  storageBucket: "se-corporation-quiz-7187e.appspot.com",
  messagingSenderId: "538290513786",
  appId: "1:538290513786:web:placeholder"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const PWD = "SE2025admin";
let allData = [];

const NL = {
  ln_def:"Definition ln/exp", eq:"Equations ln/exp", ineq:"Inequations ln/exp",
  poly3:"Polynome/ln/exp", limites:"Limites ln/exp", derivees:"Derivees ln/exp",
  variation:"Tableau variation", etude:"Etude complete"
};

// ================================================================
// CONTENU PEDAGOGIQUE — TOUT CENTRE SUR ln ET exp
// ================================================================
const SECTIONS = {
  ln_def:{
    titre:"Definition et Proprietes de ln et exp",couleur:[26,58,92],
    intro:"ln et exp sont les deux fonctions les plus importantes de la Terminale. Reciproques l'une de l'autre, elles sont au coeur de la quasi-totalite des sujets BAC Cameroun.",
    cours:[
      {st:"Fonction logarithme neperien ln",pts:["Domaine : ]0 ; +inf[ — ln n'est JAMAIS definie pour x <= 0","ln(1) = 0  |  ln(e) = 1  |  ln(e^n) = n","ln strictement croissante sur ]0 ; +inf[","ln(a x b) = ln(a) + ln(b)  pour a,b > 0","ln(a/b) = ln(a) - ln(b)  pour a,b > 0","ln(a^n) = n x ln(a)  pour a > 0"]},
      {st:"Fonction exponentielle exp",pts:["Domaine : R entier — exp est definie partout","exp(0) = 1  |  exp(1) = e  |  exp(-x) = 1/exp(x)","exp strictement croissante sur R","exp(a+b) = exp(a) x exp(b)","exp(a-b) = exp(a) / exp(b)","exp(n x a) = (exp(a))^n"]},
      {st:"Reciprocite ln / exp",pts:["ln(exp(x)) = x  pour tout x de R","exp(ln(x)) = x  pour tout x > 0","ln(x) = a  <=>  x = e^a  (avec x > 0)","exp(x) = b  <=>  x = ln(b)  (avec b > 0)"]}
    ],
    exemples:[
      {e:"Simplifier : ln(e^4) - ln(e^(-2)) + ln(1)",s:"= 4 - (-2) + 0 = 6"},
      {e:"Simplifier : exp(3 x ln(2))",s:"= exp(ln(2^3)) = exp(ln(8)) = 8"},
      {e:"Simplifier : ln(8) + ln(3) - ln(6)",s:"= ln(8x3) - ln(6) = ln(24/6) = ln(4)"},
      {e:"Calculer ln(e^2 / e^5)",s:"= ln(e^2) - ln(e^5) = 2 - 5 = -3"}
    ],
    exos:[
      {q:"Simplifier ln(e^7) + ln(e^(-3))",c:"7 + (-3) = 4"},
      {q:"Simplifier exp(2 x ln(5))",c:"= exp(ln(25)) = 25"},
      {q:"Ecrire ln(12) en fonction de ln(2) et ln(3)",c:"ln(4x3) = 2ln(2) + ln(3)"},
      {q:"Simplifier ln(racine(e))",c:"= ln(e^(1/2)) = 1/2"}
    ],
    bac:{annee:"BAC C/D Cameroun (type frequent)",enonce:"On pose f(x) = ln(x^2+1). Montrer que f est definie sur R. Calculer f(0) et f(1).",solution:"x^2+1 > 0 pour tout x (car x^2 >= 0), donc ln defini sur R. f(0)=ln(1)=0. f(1)=ln(2)."},
    conseil:"Au BAC, ln(AB)=ln(A)+ln(B) et exp(a+b)=exp(a)exp(b) reviennent tres souvent dans les simplifications. Apprenez-les par coeur !"
  },
  eq:{
    titre:"Equations avec ln et exp",couleur:[45,106,79],
    intro:"Resoudre une equation avec ln ou exp utilise la reciprocite et l'injectivite de ces fonctions. Competence directement evaluee au BAC Cameroun.",
    cours:[
      {st:"Methode pour les equations avec ln",pts:["Etape 1 : Poser le domaine (argument de ln > 0)","Etape 2 : ln(A) = ln(B)  =>  A = B  (injectivite)","Etape 3 : ln(A) = k  =>  A = e^k","Etape 4 : Verifier que la solution est dans le domaine"]},
      {st:"Methode pour les equations avec exp",pts:["exp(A) = exp(B)  =>  A = B  (injectivite)","exp(A) = k  =>  A = ln(k)  si k > 0","exp(A) = k avec k <= 0 : IMPOSSIBLE (pas de solution)","Astuce : poser X = e^x pour les equations du 2nd degre"]},
      {st:"Equations se ramenant au 2nd degre",pts:["Forme : (e^x)^2 - 3(e^x) + 2 = 0","Poser X = e^x avec X > 0 toujours !","Resoudre X^2 - 3X + 2 = 0 en X","Revenir a x : si X = e^x alors x = ln(X)"]}
    ],
    exemples:[
      {e:"Resoudre : ln(2x-1) = ln(7)",s:"Dom : 2x-1>0 => x>1/2. Injectif : 2x-1=7 => x=4. Verif 4>1/2. Sol : {4}"},
      {e:"Resoudre : ln(x+3) = 2",s:"Dom : x>-3. x+3=e^2. x=e^2-3. Sol : {e^2-3}"},
      {e:"Resoudre : e^(2x) - 3e^x + 2 = 0",s:"Poser X=e^x>0. X^2-3X+2=0. X=1 ou X=2. e^x=1 => x=0. e^x=2 => x=ln2. Sol : {0 ; ln2}"},
      {e:"Resoudre : ln(x^2-1) = 0",s:"Dom : x<-1 ou x>1. x^2-1=1 => x^2=2 => x=+-racine(2). Les deux verifient le domaine. Sol : {-racine(2) ; racine(2)}"}
    ],
    exos:[
      {q:"Resoudre ln(3x+2) = ln(5)",c:"3x+2=5 => x=1. Verif 5>0. Sol : {1}"},
      {q:"Resoudre e^(x-1) = 4",c:"x-1=ln4 => x=1+ln4"},
      {q:"Resoudre e^(2x) - 5e^x + 6 = 0",c:"X=e^x : X^2-5X+6=0. X=2 ou X=3. Sol : x=ln2 ou x=ln3"},
      {q:"Resoudre ln(x) + ln(x-1) = ln(6)",c:"Dom : x>1. ln(x(x-1))=ln6. x^2-x-6=0. x=3 ou x=-2. Sol : {3}"}
    ],
    bac:{annee:"BAC D Cameroun 2019 (adapte)",enonce:"Resoudre dans R : ln(x+1) + ln(x-1) = ln(3). Preciser le domaine.",solution:"Dom : x>1. ln((x+1)(x-1))=ln3. x^2-1=3. x^2=4. x=2 ou x=-2. Seul x=2>1. Sol : {2}"},
    conseil:"Pour toute equation avec ln, TOUJOURS preciser le domaine en premier. Oublier cette etape = perte de points garantie au BAC."
  },
  ineq:{
    titre:"Inequations avec ln et exp",couleur:[192,57,43],
    intro:"Les inequations avec ln et exp suivent la meme logique que les equations, en respectant le sens de variation (croissance) de chaque fonction.",
    cours:[
      {st:"Inequations avec ln (ln croissante)",pts:["ln(A) > ln(B)  <=>  A > B  (avec A,B > 0)","ln(x) > k  <=>  x > e^k  (et x > 0)","ln(x) < k  <=>  0 < x < e^k","ln(x) > 0  <=>  x > 1  (car ln(1) = 0)","ln(x) < 0  <=>  0 < x < 1"]},
      {st:"Inequations avec exp (exp croissante)",pts:["exp(A) > exp(B)  <=>  A > B","e^x > k  <=>  x > ln(k)  si k > 0","e^x > 0  pour TOUT x de R (toujours vraie !)","e^x > 1  <=>  x > 0","e^x < 1  <=>  x < 0"]},
      {st:"Methode en 4 etapes",pts:["1 - Identifier ln ou exp dans l'inequation","2 - Poser le domaine (ln : argument > 0)","3 - Utiliser la croissance pour ecrire l'equivalent","4 - Resoudre et intersectionner avec le domaine"]}
    ],
    exemples:[
      {e:"Resoudre : ln(2x-1) > ln(3)",s:"Dom : x>1/2. Croissante : 2x-1>3 => x>2. Intersection avec x>1/2 : x>2. Sol : ]2;+inf["},
      {e:"Resoudre : e^(x-1) <= 5",s:"x-1 <= ln5. x <= 1+ln5. Sol : ]-inf ; 1+ln5]"},
      {e:"Resoudre : ln(x^2-3) > 0",s:"Dom : x<-racine(3) ou x>racine(3). x^2-3>1 => x^2>4 => x<-2 ou x>2. Intersection : ]-inf;-2[ U ]2;+inf["},
      {e:"Resoudre : 2ln(x) - ln(x+1) < ln(2)",s:"Dom : x>0. ln(x^2/(x+1))<ln2. x^2<2x+2. x^2-2x-2<0. Racines: 1+/-racine(3). Sol : ]0 ; 1+racine(3)["}
    ],
    exos:[
      {q:"Resoudre ln(x+1) > 0",c:"x+1>1 => x>0. Sol : ]0;+inf["},
      {q:"Resoudre e^(2x) < e^3",c:"2x<3 => x<3/2. Sol : ]-inf ; 3/2["},
      {q:"Resoudre ln(x)+ln(x-2) > ln(3)",c:"Dom: x>2. x(x-2)>3. x^2-2x-3>0. (x-3)(x+1)>0. Avec x>2: x>3. Sol: ]3;+inf["},
      {q:"Resoudre e^x - 2 > 0",c:"e^x>2 => x>ln2. Sol : ]ln2 ; +inf["}
    ],
    bac:{annee:"BAC C Cameroun 2021 (type courant)",enonce:"Resoudre : ln(x+2) + ln(x) >= ln(3). Preciser le domaine.",solution:"Dom : x>0. ln(x(x+2))>=ln3. x^2+2x-3>=0. (x+3)(x-1)>=0. Sur x>0 : x>=1. Sol : [1;+inf["},
    conseil:"ln croissant = sens de l'inegalite CONSERVE. Ne confondez pas avec les fonctions decroissantes. C'est le piege classique au BAC !"
  },
  poly3:{
    titre:"Polynomes du 3e Degre relies a ln et exp",couleur:[90,50,140],
    intro:"Les polynomes du 3e degre apparaissent souvent comme numerateur ou denominateur dans les fonctions melant ln ou exp. Savoir les factoriser est indispensable pour etudier le signe de f'(x).",
    cours:[

window.generatePDF = function(id) {
  const d = allData.find(x => x.id === id);
  if(!d) return;
  const nok = [];
  if(d.notions) Object.keys(d.notions).forEach(k => { if(d.notions[k].level==="nok") nok.push(k); });
  if(!nok.length){ showToast("Aucune difficulte pour cet eleve."); return; }
  showToast("Generation du PDF... Patientez.");
  setTimeout(() => _buildPDF(d, nok), 150);
};

        checkY(bh+2);
        doc.setFillColor(249,247,242); doc.roundedRect(M,y,W-2*M,bh,1.5,1.5,'F');

        doc.setTextColor(35,35,35); doc.setFontSize(8); doc.setFont("helvetica","normal");
        doc.text(ls,M+5,y+4.5); y+=bh+2;
      });
      y+=4;
    });

    // --- PAGE EXEMPLES ---
    addPage();
    doc.setFillColor(R,G,B); doc.rect(0,0,W,18,'F');
    doc.setTextColor(255,255,255); doc.setFontSize(12); doc.setFont("helvetica","bold");
    doc.text("EXEMPLES RESOLUS ETAPE PAR ETAPE",M,13);
    doc.setFontSize(6); doc.setFont("helvetica","normal");
    doc.text(sec.titre.toUpperCase(),W-M,13,{align:"right"});
    y=26;
    sec.exemples.forEach((ex,ei)=>{
      const eL=doc.splitTextToSize(ex.e,W-2*M-16);
      const sL=doc.splitTextToSize("Solution : "+ex.s,W-2*M-16);
      checkY(eL.length*5+sL.length*5+20);
      doc.setFillColor(R,G,B); doc.circle(M+5,y+5,5,'F');
      doc.setTextColor(255,255,255); doc.setFontSize(8); doc.setFont("helvetica","bold");
      doc.text(String(ei+1),M+5,y+7,{align:"center"});
      const eH=eL.length*5+6;
      doc.setFillColor(235,245,255); doc.roundedRect(M+12,y,W-2*M-12,eH,2,2,'F');
      doc.setTextColor(R,G,B); doc.setFontSize(8.5); doc.setFont("helvetica","bold");
      doc.text(eL,M+16,y+5); y+=eH+2;
      const sH=sL.length*5+7;
      doc.setFillColor(248,255,248); doc.setDrawColor(R,G,B); doc.setLineWidth(0.4);
      doc.roundedRect(M+12,y,W-2*M-12,sH,2,2,'FD');
      doc.setTextColor(25,80,25); doc.setFontSize(8); doc.setFont("helvetica","normal");
      doc.text(sL,M+16,y+5.5); y+=sH+8;
    });

    // --- PAGE EXERCICES ---
    addPage();
    doc.setFillColor(30,30,30); doc.rect(0,0,W,18,'F');
    doc.setFillColor(R,G,B); doc.rect(0,0,5,18,'F');
    doc.setTextColor(255,255,255); doc.setFontSize(12); doc.setFont("helvetica","bold");
    doc.text("EXERCICES D'APPLICATION",M,12.5);
    doc.setTextColor(R,G,B); doc.setFontSize(6.5); doc.setFont("helvetica","normal");
    doc.text(sec.titre.toUpperCase(),W-M,12.5,{align:"right"});
    y=24;
    doc.setTextColor(120,120,120); doc.setFontSize(7.5); doc.setFont("helvetica","italic");
    doc.text("Travail personnel de "+prenom+" "+nom+" — Fais chaque exercice avant de regarder le corrige.",M,y);
    y+=10;
    sec.exos.forEach((ex,ei)=>{
      const qL=doc.splitTextToSize(ex.q,W-2*M-14);
      checkY(qL.length*5+34);
      doc.setFillColor(R,G,B); doc.circle(M+4.5,y+4.5,4.5,'F');
      doc.setTextColor(255,255,255); doc.setFontSize(8); doc.setFont("helvetica","bold");
      doc.text(String(ei+1),M+4.5,y+6,{align:"center"});
      doc.setTextColor(20,20,20); doc.setFontSize(9); doc.setFont("helvetica","bold");
      doc.text(qL,M+12,y+6); y+=qL.length*5+4;
      doc.setFillColor(253,252,249); doc.setDrawColor(210,210,210); doc.setLineWidth(0.25);
      doc.roundedRect(M+6,y,W-2*M-6,24,2,2,'FD');
      doc.setTextColor(190,190,190); doc.setFontSize(7); doc.setFont("helvetica","italic");
      doc.text("Votre demarche ici...",M+10,y+8);
      [1,2,3].forEach(li=>{ doc.setDrawColor(230,230,230); doc.line(M+10,y+8+li*5,W-M-8,y+8+li*5); });
      y+=30;
    });
    // Corriges
    checkY(14);
    doc.setFillColor(30,30,30); doc.roundedRect(M,y,W-2*M,9,3,3,'F');
    doc.setTextColor(201,168,76); doc.setFontSize(9); doc.setFont("helvetica","bold");
    doc.text("CORRIGES",W/2,y+6,{align:"center"}); y+=13;
    sec.exos.forEach((ex,ei)=>{
      const cL=doc.splitTextToSize((ei+1)+".  "+ex.c,W-2*M-10);
      const cH=cL.length*5+6;
      checkY(cH+3);
      doc.setFillColor(245,255,245); doc.setDrawColor(R,G,B); doc.setLineWidth(0.35);
      doc.roundedRect(M,y,W-2*M,cH,2,2,'FD');
      doc.setTextColor(25,90,25); doc.setFontSize(8); doc.setFont("helvetica","normal");
      doc.text(cL,M+4,y+5); y+=cH+3;
    });

    // --- BLOC BAC ---
    checkY(20); y+=6;
    doc.setFillColor(R,G,B); doc.roundedRect(M,y,W-2*M,9,3,3,'F');
    doc.setTextColor(255,255,255); doc.setFontSize(8.5); doc.setFont("helvetica","bold");
    doc.text("SUJET BAC — "+sec.bac.annee,W/2,y+6,{align:"center"}); y+=13;
    const beL=doc.splitTextToSize(sec.bac.enonce,W-2*M-8);
    const beH=beL.length*5+7;
    checkY(beH+4);
    doc.setFillColor(250,246,235); doc.setDrawColor(R,G,B); doc.setLineWidth(0.6);
    doc.roundedRect(M,y,W-2*M,beH,2,2,'FD');
    doc.setTextColor(80,50,0); doc.setFontSize(8); doc.setFont("helvetica","bold");
    doc.text(beL,M+4,y+5.5); y+=beH+4;
    const bsL=doc.splitTextToSize("CORRECTION : "+sec.bac.solution,W-2*M-8);
    const bsH=bsL.length*5+7;
    checkY(bsH+4);
    doc.setFillColor(245,255,245); doc.roundedRect(M,y,W-2*M,bsH,2,2,'F');
    doc.setTextColor(20,90,20); doc.setFontSize(8); doc.setFont("helvetica","normal");
    doc.text(bsL,M+4,y+5.5); y+=bsH+8;

    // --- CONSEIL BAC ---
    const ctL=doc.splitTextToSize(sec.conseil,W-2*M-14);
    const ctH=ctL.length*6+12;
    checkY(ctH+4);
    doc.setFillColor(255,252,230); doc.setDrawColor(201,168,76); doc.setLineWidth(0.8);
    doc.roundedRect(M,y,W-2*M,ctH,3,3,'FD');
    doc.setFillColor(201,168,76); doc.roundedRect(M,y,30,8,2,2,'F');
    doc.setTextColor(10,9,6); doc.setFontSize(6.5); doc.setFont("helvetica","bold");
    doc.text("CONSEIL BAC",M+3,y+5.5);
    doc.setTextColor(100,70,0); doc.setFontSize(8); doc.setFont("helvetica","italic");
    doc.text(ctL,M+5,y+14);
  });

  // ===== PAGE FINALE =====
  addPage();
  doc.setFillColor(10,9,6); doc.rect(0,0,W,H,'F');
  doc.setFillColor(201,168,76); doc.rect(0,0,W,5,'F'); doc.rect(0,H-5,W,5,'F');
  doc.setTextColor(201,168,76); doc.setFontSize(52); doc.setFont("helvetica","bold");
  doc.text("GO,",W/2,78,{align:"center"});
  doc.setFontSize(36); doc.text(prenom.toUpperCase()+" !",W/2,105,{align:"center"});
  doc.setTextColor(255,255,255); doc.setFontSize(10.5); doc.setFont("helvetica","normal");
  const finalLines=[
    "Tu as maintenant tous les outils pour progresser.",
    "Travaille chaque notion dans l'ordre du document.",
    "Refais les exemples sans regarder la solution.",
    "Fais tous les exercices avant de consulter le corrige.",
    "Reviens sur les conseils BAC avant l'examen.",
    "",
    "Le BAC se gagne dans la regularite, pas dans l'urgence."

  finalLines.forEach((line,li)=>{
    doc.setTextColor(li===6?201:200, li===6?168:200, li===6?76:200);
    doc.text(line,W/2,128+li*11,{align:"center"});
  });
  doc.setFillColor(201,168,76); doc.roundedRect(M+10,213,W-2*(M+10),24,4,4,'F');
  doc.setTextColor(10,9,6); doc.setFontSize(8.5); doc.setFont("helvetica","bold");
  doc.text("Des questions ? On est la pour toi !",W/2,223,{align:"center"});
  doc.setFontSize(9);
  doc.text("WhatsApp : +237 6 95 55 35 85 — Ing. Moise Zame",W/2,232,{align:"center"});

  const fn=("Plan_"+prenom+"_"+nom+"_ln_exp_SE.pdf").replace(/[^a-zA-Z0-9_\-\.]/g,"_");
  doc.save(fn);
  showToast("PDF de "+prenom+" "+nom+" genere !");
}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),4000);
}

// ================================================================
// DASHBOARD LOGIC
// ================================================================
window.login = function(){
  const p=document.getElementById("pwd").value;
  if(p===PWD){
    document.getElementById("login-wrap").style.display="none";
    document.getElementById("dashboard").style.display="block";
    loadData();
  } else { document.getElementById("err-login").style.display="block"; }
};

window.loadData = async function(){
  document.getElementById("table-area").innerHTML='<div class="loading"><div class="spin"></div></div>';
  try{
    const q=query(collection(db,"diagnostics"),orderBy("date","desc"));
    const snap=await getDocs(q);
    allData=[]; snap.forEach(doc=>allData.push({id:doc.id,...doc.data()}));
    updateStats(); populateMetierFilter(); applyFilters();
  }catch(e){
    document.getElementById("table-area").innerHTML='<div class="loading">Erreur de chargement.</div>';
  }
};

function updateStats(){
  const total=allData.length;
  const pi=allData.filter(d=>d.preinscrit==="oui").length;
  const npi=allData.filter(d=>d.preinscrit==="non").length;
  const sem=getSemaine();
  const week=allData.filter(d=>d.semaine===sem).length;
  document.getElementById("st-total").textContent=total;
  document.getElementById("st-pi").textContent=pi;
  document.getElementById("st-npi").textContent=npi;
  document.getElementById("st-week").textContent=week;
}

function populateMetierFilter(){
  const metiers=[...new Set(allData.map(d=>d.metier||"RAS").filter(Boolean))].sort();
  const sel=document.getElementById("f-metier");
  const cur=sel.value;
  sel.innerHTML='<option value="">Tous</option>';
  metiers.forEach(m=>sel.innerHTML+=`<option value="${m}"${cur===m?" selected":""}>${m}</option>`);
}

window.applyFilters = function(){
  const search=document.getElementById("f-search").value.toLowerCase();
  const classe=document.getElementById("f-classe").value;
  const metier=document.getElementById("f-metier").value;
  const pi=document.getElementById("f-pi").value;
  const notion=document.getElementById("f-notion").value;
  const filtered=allData.filter(d=>{
    if(search&&!(d.prenom+d.nom+(d.etab||"")).toLowerCase().includes(search)) return false;
    if(classe&&d.classe!==classe) return false;
    if(metier&&d.metier!==metier) return false;
    if(pi&&d.preinscrit!==pi) return false;
    if(notion&&d.notions&&d.notions[notion]&&d.notions[notion].level!=="nok") return false;
    return true;
  });
  renderTable(filtered);
  document.getElementById("count-lbl").textContent=filtered.length+" / "+allData.length+" eleves";
};

function renderTable(data){
  if(!data.length){ document.getElementById("table-area").innerHTML='<div class="loading">Aucun resultat.</div>'; return; }
  let html='<div style="overflow-x:auto"><table><thead><tr><th>#</th><th>Nom complet</th><th>Classe</th><th>Metier</th><th>Preinscrit</th><th>Points faibles</th><th>Tel.</th><th>Date</th><th>Actions</th></tr></thead><tbody>';
  data.forEach((d,i)=>{
    const nok=[];
    if(d.notions) Object.keys(d.notions).forEach(k=>{ if(d.notions[k].level==="nok") nok.push(NL[k]||k); });
    const piCls=d.preinscrit==="oui"?"pill-pi-oui":"pill-pi-non";
    const piLbl=d.preinscrit==="oui"?"&#9989; Oui":"&#10060; Non";
    const dateStr=d.date&&d.date.toDate?d.date.toDate().toLocaleDateString("fr-FR"):d.semaine||"—";
    const nokH=nok.length?nok.map(n=>`<span class="pill pill-nok">${n}</span>`).join(" "):'<span class="pill pill-neutral">Aucun</span>';
    html+=`<tr>
      <td style="color:var(--gris);font-size:.75rem;">${i+1}</td>
      <td><strong>${d.prenom} ${d.nom}</strong>${d.sexe?`<br><span style="font-size:.7rem;color:var(--gris)">${d.sexe}</span>`:""}</td>
      <td>${d.classe}</td><td>${d.metier}</td>
      <td><span class="pill ${piCls}">${piLbl}</span></td>
      <td>${nokH}</td>
      <td style="font-size:.78rem;">${d.tel}${d.tel_parent?`<br><span style="color:var(--bleu)">Parent: ${d.tel_parent}</span>`:""}</td>
      <td style="font-size:.75rem;color:var(--gris);">${dateStr}</td>
      <td style="display:flex;gap:.3rem;flex-wrap:wrap;">
        <button class="btn-detail" onclick="showDetail('${d.id}')">Detail</button>
        <button class="btn-pdf" onclick="generatePDF('${d.id}')">&#128229; PDF</button>
      </td>
    </tr>`;
  });
  html+='</tbody></table></div>';
  document.getElementById("table-area").innerHTML=html;
}

window.showDetail = function(id){
  const d=allData.find(x=>x.id===id); if(!d) return;
  const ok=[],nok=[],none=[];
  if(d.notions) Object.keys(d.notions).forEach(k=>{
    const s=d.notions[k],lbl=NL[k]||k;
    const type=s.type==="def"?" (Def.)":s.type==="app"?" (App.)":s.type==="both"?" (Les deux)":"";
    if(s.level==="ok") ok.push(lbl);
    else if(s.level==="nok") nok.push(lbl+type);
    else none.push(lbl);
  });
  let html=`<div class="detail-title">${d.prenom} ${d.nom}</div><div class="detail-grid">
    <div class="dg-item"><div class="dg-label">Classe</div><div class="dg-val">${d.classe}</div></div>
    <div class="dg-item"><div class="dg-label">Sexe</div><div class="dg-val">${d.sexe||"—"}</div></div>
    <div class="dg-item"><div class="dg-label">Etablissement</div><div class="dg-val">${d.etab||"—"}</div></div>
    <div class="dg-item"><div class="dg-label">Metier vise</div><div class="dg-val">${d.metier}</div></div>
    <div class="dg-item"><div class="dg-label">WhatsApp</div><div class="dg-val">${d.tel}</div></div>
    <div class="dg-item"><div class="dg-label">Preinscrit</div><div class="dg-val">${d.preinscrit==="oui"?"&#9989; Oui":"&#10060; Non"}</div></div>
  </div><div style="font-weight:600;font-size:.85rem;margin-bottom:.5rem;">Notions — Detail</div><div class="notion-recap">`;
  nok.forEach(n=>html+=`<div class="nr-row nr-nok"><span>&#128308; ${n}</span><span class="pill pill-nok">Difficulte</span></div>`);
  ok.forEach(n=>html+=`<div class="nr-row nr-ok"><span>&#128994; ${n}</span><span class="pill pill-ok">Maitrise</span></div>`);
  none.forEach(n=>html+=`<div class="nr-row nr-none"><span>${n}</span><span style="font-size:.72rem;color:#bbb">Non evalue</span></div>`);
  html+=`</div><div style="margin-top:1rem;"><button onclick="generatePDF('${d.id}')" class="btn-pdf" style="width:100%;padding:.7rem;font-size:.88rem;border-radius:9px;justify-content:center;display:flex;align-items:center;gap:.4rem;">&#128229; Generer le PDF personnalise pour ${d.prenom}</button></div>`;
  document.getElementById("detail-content").innerHTML=html;
  document.getElementById("detail-overlay").classList.add("open");
};

window.closeDetail=function(e){ if(e.target===document.getElementById("detail-overlay")) document.getElementById("detail-overlay").classList.remove("open"); };

window.exportCSV=function(){
  const rows=[["Prenom","Nom","Sexe","Classe","Etablissement","Metier","Tel","Tel Parent","Preinscrit","ln_def","eq","ineq","poly3","limites","derivees","variation","etude","Semaine"]];
  allData.forEach(d=>{
    const row=[d.prenom,d.nom,d.sexe||"",d.classe,d.etab||"",d.metier,d.tel,d.tel_parent||"",d.preinscrit];
    ["ln_def","eq","ineq","poly3","limites","derivees","variation","etude"].forEach(k=>{
      const s=d.notions&&d.notions[k]; row.push(s?(s.level||"")+"|"+(s.type||""):"");
    });
    row.push(d.semaine||""); rows.push(row);
  });
  const csv=rows.map(r=>r.map(c=>'"'+(c||"").toString().replace(/"/g,'""')+'"').join(",")).join("\n");
  const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download="diagnostics_SE_Corp.csv"; a.click();
};

function getSemaine(){
  const d=new Date(),j=d.getDay()||7,l=new Date(d);
  l.setDate(d.getDate()-j+1); return l.toISOString().slice(0,10);
}
